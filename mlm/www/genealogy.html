<!DOCTYPE html>
<html>

<head>

	<title>MLM Genealogy</title>

	<style>

		body {
			font-family: Arial;
			padding: 30px;
			background: #f5f5f5;
			overflow-x: auto;
		}

		h1 {
			text-align: center;
			margin-bottom: 40px;
		}

		.tree ul {
			padding-top: 20px;
			position: relative;
			transition: all 0.5s;
			display: flex;
			justify-content: center;
		}

		.tree li {

			list-style-type: none;
			position: relative;
			padding: 20px 5px 0 5px;

			text-align: center;
		}

		.tree li::before,
		.tree li::after {

			content: '';
			position: absolute;
			top: 0;
			right: 50%;

			border-top: 2px solid #ccc;

			width: 50%;
			height: 20px;
		}

		.tree li::after {

			right: auto;
			left: 50%;

			border-left: 2px solid #ccc;
		}

		.tree li:only-child::after,
		.tree li:only-child::before {

			display: none;
		}

		.tree li:only-child {
			padding-top: 0;
		}

		.tree li:first-child::before,
		.tree li:last-child::after {

			border: 0 none;
		}

		.tree li:last-child::before {

			border-right: 2px solid #ccc;
			border-radius: 0 5px 0 0;
		}

		.tree li:first-child::after {

			border-radius: 5px 0 0 0;
		}

		.tree ul ul::before {

			content: '';
			position: absolute;
			top: 0;
			left: 50%;

			border-left: 2px solid #ccc;

			width: 0;
			height: 20px;
		}

		.node {

			border: 1px solid #ddd;
			padding: 15px;
			display: inline-block;

			border-radius: 12px;

			background: white;

			min-width: 180px;

			font-weight: bold;

			box-shadow: 0 3px 10px rgba(0,0,0,0.1);

			transition: 0.3s;
		}

		.node:hover {

			transform: translateY(-3px);

			box-shadow: 0 6px 20px rgba(0,0,0,0.15);
		}

		.node.current-node {

			background: #e8f5e9;

			border-color: #2e7d32;

			color: #1b5e20;

			box-shadow: 0 6px 20px rgba(46, 125, 50, 0.25);
		}

		.node.current-node .distributor-id {

			color: #1b5e20;
		}

		.node.current-node .leg {

			background: #2e7d32;

			color: white;
		}

		.distributor-id {

			font-size: 14px;
			color: #333;
			margin-bottom: 8px;
		}

		.leg {

			font-size: 12px;

			padding: 4px 10px;

			border-radius: 20px;

			display: inline-block;

			background: #f0f0f0;
		}

	</style>

</head>

<body>

	<h1>MLM Genealogy Tree</h1>

	<div class="tree" id="tree"></div>

	<script>

		const currentDistributor = new URLSearchParams(window.location.search)
			.get("distributor")

		async function loadTree() {

			const response = await fetch(
				"/api/method/mlm.api.tree.get_tree"
			)

			const data = await response.json()

			const nodes = data.message

			console.log(nodes)

			const map = {}

			nodes.forEach(node => {

				map[node.distributor] = {
					...node,
					children: []
				}
			})

			let root = null

			nodes.forEach(node => {

				if (node.parent_distributor) {

					map[node.parent_distributor]
						.children
						.push(map[node.distributor])

				} else {

					root = map[node.distributor]
				}
			})

			document.getElementById("tree")
				.innerHTML = `<ul>${renderTree(root)}</ul>`
		}

		function renderTree(node) {

			if (!node) return ""

			let childrenHTML = ""

			if (node.children.length > 0) {

				childrenHTML = "<ul>"

				node.children.forEach(child => {

					childrenHTML += renderTree(child)
				})

				childrenHTML += "</ul>"
			}

			return `
				<li>

					<div class="node ${node.distributor === currentDistributor ? "current-node" : ""}">

						<div class="distributor-id">
							${node.distributor}
						</div>

						<div class="leg">
							${node.leg_position || "Root"}
						</div>

					</div>

					${childrenHTML}

				</li>
			`
		}

		loadTree()

	</script>

</body>

</html>
