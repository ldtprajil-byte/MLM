<!DOCTYPE html>
<html>
<head>
  <title>MLM Genealogy</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', Arial, sans-serif;
      background: #f0f2f7;
      padding: 40px 20px 60px;
      overflow-x: auto;
      min-height: 100vh;
    }

    h1 {
      text-align: center;
      font-size: 17px;
      font-weight: 600;
      color: #1a1d23;
      letter-spacing: -0.2px;
      margin-bottom: 40px;
    }

    /* ── Tree layout ── */
    .tree {
      display: flex;
      justify-content: center;
      min-width: max-content;
    }

    .tree ul {
      padding-top: 40px;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .tree li {
      list-style: none;
      position: relative;
      padding: 0 20px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .tree li::before,
    .tree li::after {
      content: '';
      position: absolute;
      top: 0;
      right: 50%;
      border-top: 2px solid #b0b8cc;
      width: 50%;
      height: 40px;
    }
    .tree li::after {
      right: auto;
      left: 50%;
      border-left: 2px solid #b0b8cc;
    }
    .tree li:only-child::before,
    .tree li:only-child::after { display: none; }
    .tree li:only-child { padding-top: 0; }
    .tree li:first-child::before,
    .tree li:last-child::after { border: 0 none; }
    .tree li:last-child::before {
      border-right: 2px solid #b0b8cc;
      border-radius: 0 5px 0 0;
    }
    .tree li:first-child::after {
      border-radius: 5px 0 0 0;
    }
    .tree ul ul::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      border-left: 2px solid #b0b8cc;
      width: 0;
      height: 40px;
    }

    /* ── Node ── */
    .node {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .avatar-circle {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      /* solid blue fill matching reference */
      background: #5b7be8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      /* double-ring border effect */
      border: 3px solid #fff;
      outline: 2.5px solid #5b7be8;
      outline-offset: 2px;
      box-shadow: 0 2px 8px rgba(91,123,232,0.30);
      transition: transform 0.18s, box-shadow 0.18s;
      position: relative;
    }

    .node:hover .avatar-circle {
      transform: translateY(-3px) scale(1.06);
      box-shadow: 0 8px 22px rgba(91,123,232,0.35);
    }

    /* Current distributor (YOU) — green */
    .current-node .avatar-circle {
      background: #27ae60;
      outline-color: #27ae60;
      box-shadow: 0 2px 8px rgba(39,174,96,0.35);
    }
    .current-node:hover .avatar-circle {
      box-shadow: 0 8px 22px rgba(39,174,96,0.40);
    }

    .you-badge {
      position: absolute;
      top: -7px;
      left: 50%;
      transform: translateX(-50%);
      background: #16a34a;
      color: #fff;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.8px;
      padding: 1px 6px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .node-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .node-name {
      font-size: 12px;
      font-weight: 600;
      color: #1a1d23;
      white-space: nowrap;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .node-id {
      font-size: 10px;
      color: #9097ab;
      font-weight: 400;
      white-space: nowrap;
    }

    /* hide ROOT wrapper node itself */
    .root-wrapper > .node { display: none; }
    .root-wrapper > ul::before { display: none; }
    .root-wrapper { padding: 0 !important; }
  </style>
</head>
<body>

  <h1>MLM Genealogy Tree</h1>
  <div class="tree" id="tree"></div>

  <script>
    const currentDistributor = new URLSearchParams(window.location.search).get("distributor");

    
    // Generate initials from distributor_name (e.g. "aman" → "AM", "admin user" → "AU")
    function initials(name) {
      if (!name) return "?";
      const parts = name.trim().split(/\s+/);
      if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
      return name.slice(0, 2).toUpperCase();
    }

    async function loadTree() {
      try {
        const response = await fetch("/api/method/mlm.api.tree.get_tree");
        const data = await response.json();
        const nodes = data.message || [];

        const map = {};
        nodes.forEach(n => { map[n.distributor] = { ...n, children: [] }; });

        let root = null;
        nodes.forEach(n => {
          if (n.parent_distributor && map[n.parent_distributor]) {
            map[n.parent_distributor].children.push(map[n.distributor]);
          } else {
            root = map[n.distributor];
          }
        });

        document.getElementById("tree").innerHTML =
          root
            ? `<ul>${renderTree(root, true)}</ul>`
            : "<p style='text-align:center;color:#9097ab;margin-top:40px'>No data found.</p>";

      } catch (e) {
        document.getElementById("tree").innerHTML =
          "<p style='text-align:center;color:#9097ab;margin-top:40px'>Could not load tree.</p>";
      }
    }

    function renderTree(node, isRoot = false) {
      if (!node) return "";

      let childrenHTML = "";
      if (node.children.length > 0) {
        childrenHTML = "<ul>" + node.children.map(c => renderTree(c)).join("") + "</ul>";
      }

      const isCurrent = node.distributor === currentDistributor;
      const displayName = node.distributor_name || node.distributor;
      const av = initials(displayName);
      const badge = isCurrent ? `<span class="you-badge">YOU</span>` : "";

      return `
        <li class="${isRoot ? "root-wrapper" : ""}">
          <div class="node ${isCurrent ? "current-node" : ""}">
            <div class="avatar-circle">
              ${badge}${av}
            </div>
            <div class="node-label">
              <span class="node-name" title="${displayName}">${displayName}</span>
              <span class="node-id">${node.distributor}</span>
            </div>
          </div>
          ${childrenHTML}
        </li>`;
    }

    loadTree();
  </script>

</body>
</html>
